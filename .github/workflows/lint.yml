name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          # Treat all warnings as errors to keep scripts clean.
          severity: warning
          # Check all .sh files recursively.
          scandir: "."
          # Space-separated paths to exclude (matched by component).
          # - .fonts-work: generated font cache, not committed.
          # - dotfiles: interactive shell config, not part of the script
          #   suite. .zshrc is zsh (e.g. powerlevel10k's ${(%):-%n}), which
          #   shellcheck cannot parse, producing unfixable false positives.
          ignore_paths: ".fonts-work dotfiles"

  shfmt:
    name: shfmt formatting check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shfmt
        # Maintained, pinned action that places shfmt on PATH for later steps.
        uses: mfinelli/setup-shfmt@v3
        with:
          shfmt-version: 3.8.0

      - name: Check shell script formatting
        # -d prints a diff if the file is not correctly formatted (non-zero exit).
        # -i 2 matches the two-space indent used in this repository.
        # -ln bash targets the bash dialect.
        run: |
          find . -name '*.sh' \
            -not -path './.git/*' \
            -not -path './.fonts-work/*' \
            -print0 | xargs -0 shfmt -d -i 2 -ln bash
